apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: myapp-replicaset
  labels:
    app: myapp
    type: front-end
    function: Front-end
  annotations:
    buildversion: 1.34
spec:
  template:
    metadata:
      name: myapp-pod
      labels:
        app: myapp
        type: front-end
    spec:
      containers:
      - name: nginx-cntainer
        image: nginx
  replicas: 6
  selector:
    matchLabels:
      type: front-end
